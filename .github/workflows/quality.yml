name: Quality

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r starter_code/requirements.txt

      - name: Verify installed dependency graph
        run: python -m pip check

      - name: Run repository validation
        run: bash scripts/validate_repo.sh
